<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="Continental Luxe Hosting">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100d08"/>
      <stop offset="0.5" stop-color="#1a140a"/>
      <stop offset="1" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7c873"/>
      <stop offset="0.5" stop-color="#caa24a"/>
      <stop offset="1" stop-color="#9c7a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#caa24a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#caa24a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>
  <rect x="20" y="20" width="560" height="320" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.35"/>

  <!-- CL monogram -->
  <g transform="translate(300 132)" text-anchor="middle">
    <circle cx="0" cy="0" r="44" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="14" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-style="italic" fill="url(#gold)">CL</text>
  </g>

  <text x="300" y="232" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="2" fill="#f5efe2">Continental</text>
  <text x="300" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="7" fill="url(#gold)">LUXE HOSTING</text>

  <line x1="250" y1="290" x2="350" y2="290" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <text x="300" y="314" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3" fill="#8a8175">AIRBNB CO-HOSTING PLATFORM</text>
</svg>
